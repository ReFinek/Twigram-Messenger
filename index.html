<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twigram</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <div class="options-sidebar"></div>

        <div class="chat-list-panel" id="chatListPanel">
            <div class="search-area">
                <div class="search-panel">
                    <input type="text" class="search-input" placeholder="Поиск...">
                </div>
            </div>
            <div class="chat-list-content"></div>
        </div>

        <div class="resize-handle" id="resizeHandle"></div>

        <div class="active-chat-area">
            <div class="chat-header">
                <h2>Общий чат</h2>
            </div>
            <div class="chat-messages-area" id="chatMessagesArea"></div>
            <div class="message-input-panel">
                <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение...">
                <!-- Скрытый input для выбора файла -->
                <input type="file" id="image-input" accept="image/*" hidden>
                
                <!-- Контейнер для превью (опционально, но рекомендуется) -->
                <div id="image-preview" style="display: none; padding: 8px 15px; background: #2c2c2e;"></div>
                
                <!-- Кнопка прикрепления (опционально, если хотите иконку скрепки) -->
                <!-- Добавьте в chat-input-container, перед message-input: -->
                <button type="button" id="attach-image" class="icon" title="Прикрепить изображение">📎</button>
                <button id="sendButton">➤</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="chat.js"></script>
    <script src="script.js"></script>
</body>
</html>
